name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collab-electron
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: TypeScript typecheck
        run: bunx tsc --build --noEmit
        continue-on-error: true

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collab-electron
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test -- --ignore='**/tmux*'

  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: collab-electron
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --ignore-scripts

      - name: Build
        run: bun run build
        env:
          NODE_OPTIONS: --max-old-space-size=8192
